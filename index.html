<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mirror">
  <meta name="description" content="Tu espejo inteligente. Camara frontal en pantalla completa, siempre lista.">
  <title>Mirror</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/app.css?v=1.0">
  <link rel="icon" href="/media/icons/icon-192.png">
</head>
<body>
  <div id="app">

    <!-- Camara -->
    <video id="camera" autoplay playsinline muted></video>

    <!-- Controles (se muestran al tocar) -->
    <div id="controls" class="hidden">

      <div class="bar-top">
        <div class="brand">
          <span class="brand-star">✦</span>
          <span class="brand-name">MIRROR</span>
        </div>
        <button id="btn-fullscreen" class="icon-btn" aria-label="Pantalla completa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
      </div>

      <div class="bar-bottom">
        <div class="slider-row">
          <svg class="sl-icon" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <input type="range" id="brightness" min="40" max="200" value="100" aria-label="Brillo">
        </div>

        <div class="slider-row">
          <svg class="sl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="11" y1="8" x2="11" y2="14"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
          <input type="range" id="zoom" min="100" max="250" value="100" aria-label="Zoom">
        </div>

        <div class="btn-row">
          <button id="btn-flip" class="main-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10"/>
              <polyline points="23 20 23 14 17 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            Cambiar cámara
          </button>
        </div>
      </div>

    </div><!-- /controls -->

    <!-- Pantalla de error -->
    <div id="error-screen" class="hidden">
      <div class="panel">
        <div class="panel-icon">📷</div>
        <h2>Cámara no disponible</h2>
        <p>Permite el acceso a la cámara para usar el espejo.</p>
        <button id="btn-retry" class="main-btn">Intentar de nuevo</button>
      </div>
    </div>

    <!-- Pantalla de carga -->
    <div id="loading-screen">
      <div class="panel">
        <div class="loading-star">✦</div>
        <p>Iniciando...</p>
      </div>
    </div>

  </div><!-- /app -->

  <script src="/js/app.js?v=1.0"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
